apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.names.secret }}
  labels:
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  postgres-password: {{ .Values.postgres.auth.password | b64enc | quote }}
  postgres-username: {{ .Values.postgres.auth.username | b64enc | quote }}
  postgres-database: {{ .Values.postgres.auth.database | b64enc | quote }}
