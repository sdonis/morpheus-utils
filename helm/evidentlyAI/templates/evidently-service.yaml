apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.names.evidently }}
  labels:
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: evidently
spec:
  type: {{ .Values.evidently.service.type }}
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: evidently
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.evidently.service.port }}
      targetPort: http
      {{- if and (eq .Values.evidently.service.type "NodePort") .Values.evidently.service.nodePort }}
      nodePort: {{ .Values.evidently.service.nodePort }}
      {{- end }}
